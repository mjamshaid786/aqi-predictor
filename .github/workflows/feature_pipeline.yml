name: Hourly Feature Pipeline

on:
  schedule:
    - cron: '25 * * * *'  # Runs every hour
  workflow_dispatch:      # Manual trigger button

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python 3.12.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1: Fetch fresh raw data from AQICN API
      - name: Fetch Fresh Data from API
        env:
          AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}
        run: |
          python src/feature_pipeline.py

      # Step 2: Clean the fetched data
      - name: Clean Data
        run: |
          python src/data/data_cleaning.py

      # Step 3: Upload cleaned data to Hopsworks Feature Store
      - name: Upload Cleaned Data to Hopsworks
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
        run: |
          python src/uploading_to_hopsworks.py